<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4B71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="36" height="36" rx="9" fill="#1B1526"/>
  <rect x="2" y="2" width="36" height="36" rx="9" stroke="url(#asGradient)" stroke-width="2" fill="none"/>

  <!-- AS monogram -->
  <text x="20" y="27" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="16" font-weight="800" fill="url(#asGradient)">AS</text>
</svg>
